<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Ujian | ST Bhinneka</title>
  <link rel="shortcut icon" href="images/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Inter", sans-serif;
      font-size: 15px;
      color: #2b2b2b;
      margin: 20px;
      background-color: #fff;
      transition: all 0.3s ease-in-out;
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      color: #212529;
    }

    h2,
    h5 {
      font-size: 18px;
      font-weight: 600;
    }

    #searchInput {
      font-size: 14px;
      padding: 8px 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: left;
      font-size: 14px;
    }

    thead th {
      position: sticky;
      top: 0;
      background-color: #dee2e6;
      color: #212529;
      font-weight: 600;
      z-index: 1;
    }

    thead th.sem1-header {
      background-color: #0d6efd !important;
      color: #fff !important;
    }

    thead th.sem3-header {
      background-color: #198754 !important;
      color: #fff !important;
    }

    thead th.sem5-header {
      background-color: #fd7e14 !important;
      color: #fff !important;
    }

    tbody tr:hover {
      background-color: #f8f9fa;
    }

    #infoHariTanggal {
      text-align: center;
      margin-bottom: 15px;
      font-weight: bold;
      font-size: 18px;
      color: #0d6efd;
    }

    /* NAV TABS */
    .nav-tabs {
      border-bottom: none;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .nav-tabs .nav-link {
      font-weight: 500;
      color: #555;
      border: 2px solid transparent;
      border-radius: 8px 8px 0 0;
      transition: all 0.3s ease;
      padding: 10px 22px;
      font-size: 15px;
    }

    .nav-tabs .nav-link:hover {
      background-color: #f8f9fa;
      transform: translateY(-2px);
    }

    #sem1-tab.active {
      background-color: #0d6efd !important;
      color: #fff !important;
      border-color: #0d6efd !important;
      box-shadow: 0 0 10px rgba(13, 110, 253, 0.4);
    }

    #sem3-tab.active {
      background-color: #198754 !important;
      color: #fff !important;
      border-color: #198754 !important;
      box-shadow: 0 0 10px rgba(25, 135, 84, 0.4);
    }

    #sem5-tab.active {
      background-color: #fd7e14 !important;
      color: #fff !important;
      border-color: #fd7e14 !important;
      box-shadow: 0 0 10px rgba(253, 126, 20, 0.4);
    }

    /* ANIMASI LINK AKTIF */
    .badge.bg-primary {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(13, 110, 253, 0.5);
      }

      70% {
        box-shadow: 0 0 0 6px rgba(13, 110, 253, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(13, 110, 253, 0);
      }
    }

    /* Fade animasi muncul */
    .fade-in {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 0.6s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* DARK MODE */
    body.dark-mode {
      background-color: #121212;
      color: #e0e0e0;
    }

    body.dark-mode h1,
    h2,
    h5 {
      color: #f8f9fa;
    }

    body.dark-mode table {
      box-shadow: 0 2px 6px rgba(255, 255, 255, 0.05);
    }

    body.dark-mode th,
    td {
      border-color: #444;
    }

    body.dark-mode thead th {
      background-color: #1f1f1f;
      color: #f1f1f1;
    }

    body.dark-mode tbody tr:hover {
      background-color: #2a2a2a;
    }

    #darkToggle {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 1000;
    }

    @media (max-width: 576px) {
      h1 {
        font-size: 22px;
        text-align: center;
      }

      table th,
      td {
        font-size: 13px;
        padding: 4px;
      }

      .nav-tabs .nav-link {
        padding: 6px 10px;
        font-size: 13px;
      }

      #infoHariTanggal {
        font-size: 16px;
      }
    }

    /* Agar tabel lebar dan bisa di-scroll, cegah text wrapping */
    th,
    td {
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <button id="darkToggle" class="btn btn-outline-secondary btn-sm">🌙</button>

  <div class="container-fluid px-4">
    <header class="d-flex flex-column align-items-center py-1 mb-4 border-bottom">
      <img src="./images/logo.png" alt="logo" width="80px" height="80px" class="mb-3" />
      <h1 class="text-center text-decoration-underline mb-3">Jadwal Ujian Online</h1>
      <p class="text-center mb-0">Informasi ujian yang dilaksanakan melalui sistem CBT.</p>
    </header>

    <!-- Tabs semester -->
    <h6 class="text-secondary text-center mb-2">Pilih Semester</h6>
    <ul class="nav nav-tabs" id="ujianTabs" role="tablist">
      <li class="nav-item"><button class="nav-link active" id="sem1-tab" type="button">Semester 1</button></li>
      <li class="nav-item"><button class="nav-link" id="sem3-tab" type="button">Semester 3</button></li>
      <li class="nav-item"><button class="nav-link" id="sem5-tab" type="button">Semester 5</button></li>
    </ul>

    <!-- Search bar -->
    <div id="searchContainer" class="col-12 col-lg-6 mx-auto mb-3 d-none">
      <div class="input-group fade-in">
        <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
        <input type="text" id="searchInput" class="form-control border-start-0"
          placeholder="Cari Nama / NIM / Mata Kuliah / Kelas / Dosen...">
      </div>
    </div>

    <div id="infoHariTanggal" class="d-none"></div>

    <!-- Tabel jadwal -->
    <div id="tableContainer" class="d-none fade-in" style="overflow: auto; max-height: 70vh;">
      <table class="table table-bordered table-striped" id="ujianTable">
        <thead>
          <tr>
            <th class="text-center">No.</th>
            <th class="text-center">Jam Ujian</th>
            <th class="text-center">NIM</th>
            <th class="text-center">Nama Mahasiswa</th>
            <th class="text-center">Kelas</th>
            <th class="text-center">Mata Kuliah</th>
            <th class="text-center">Link Ujian</th>
            <th class="text-center">Kode Dosen</th>
          </tr>
        </thead>
        <tbody id="ujianBody"></tbody>
      </table>
    </div>
  </div>
  <footer class="text-center text-muted small py-3 mt-4 border-top">
    © <span id="year"></span> Sistem Ujian Online CBT – Universitas Satya Terra Bhinneka
  </footer>

  <script>
    // agar tahun otomatis
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>


  <script>
    let allData = [];

    const getData = (semester) => {
      // alert("Debug: Mengambil data semester " + semester);
      localStorage.setItem('CURRENT_SEMESTER', semester);

      // Ganti ke file baru sesuai request
      const url = `data/hasil_konversi_remedial.json?v=${new Date().getTime()}`;

      fetch(url)
        .then(r => {
          if (!r.ok) throw new Error(`Gagal memuat file (${r.status}).`);
          return r.json();
        })
        .then(data => {
          // Filter data berdasarkan kolom Sem yang baru saja di-generate (Sem 1, 3, 5, dll)
          const filtered = data.filter(item => {
            const sem = item["Sem"] || item["Semester"] || "";
            return sem.toString() === semester.toString();
          });

          allData = filtered;
          renderTable(allData);
          document.getElementById("infoHariTanggal").classList.remove("d-none");
          document.getElementById("searchContainer").classList.remove("d-none");
          document.getElementById("tableContainer").classList.remove("d-none");

          const ths = document.querySelectorAll("thead th");
          ths.forEach(th => th.classList.remove("sem1-header", "sem3-header", "sem5-header"));
          ths.forEach(th => th.classList.add(`sem${semester}-header`));
        })
        .catch(err => {
          console.error(err);
          alert("Terjadi Error: " + err.message + "\nCek apakah file JSON ada.");
        });
    };

    // Tanggal pelaksanaan ujian (saat ini aktif)
    const tanggalMulaiUjian = new Date("2026-01-20");
    const tanggalAkhirUjian = new Date("2026-02-28");
    const today = new Date();

    // Kita paksa true dulu agar tampil, jika ingin proteksi tanggal nyalakan ini:
    // let isWithinDateRange = (today >= tanggalMulaiUjian && today <= tanggalAkhirUjian);
    let isWithinDateRange = true;

    if (!isWithinDateRange) {
      document.getElementById("tableContainer").innerHTML = `
        <div class="alert alert-info text-center mt-4">
          Tidak ada jadwal ujian saat ini (di luar periode pelaksanaan).
        </div>`;
      document.getElementById("tableContainer").classList.remove("d-none");
    }


    function renderTable(data) {
      const tbody = document.getElementById("ujianBody");
      tbody.innerHTML = "";
      const existingMsg = document.getElementById("noExamMsg");
      if (existingMsg) existingMsg.remove();

      const now = new Date();
      const jamSekarang = now.getHours() + now.getMinutes() / 60;
      const hari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
      document.getElementById("infoHariTanggal").innerHTML =
        `${hari[now.getDay()]}, ${now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}`;

      // Helper untuk ambil data dari berbagai kemungkinan key (Case Sensitive di JSON)
      const getVal = (item, keys) => {
        for (const k of keys) {
          if (item[k] !== undefined && item[k] !== null) return item[k];
        }
        return "";
      };

      const dayMap = { "minggu": 0, "senin": 1, "selasa": 2, "rabu": 3, "kamis": 4, "jumat": 5, "sabtu": 6 };

      // Filter hari. Support key "Hari" (lama) dan "HARI" (baru)
      const todayData = data.filter(item => {
        let h = getVal(item, ["HARI", "Hari", "Hari, Tanggal"]);
        // Handle "Hari, Tanggal" format: "Jum'at, 06 Februari 2026"
        if (h && h.includes(",")) {
          h = h.split(",")[0];
        }
        // Handle Jum'at -> jumat
        return dayMap[(h || "").trim().toLowerCase().replace("'", "")] === now.getDay();
      });

      // const todayData = data; // DEBUG Only: Tampilkan semua data jika filter bermasalah

      if (todayData.length === 0) {
        const msg = document.createElement("p");
        msg.id = "noExamMsg";
        msg.textContent = "Tidak ada jadwal ujian online hari ini!";
        msg.className = "text-center text-danger mt-3 fw-bold";
        document.querySelector(".container").appendChild(msg);
        return;
      }

      let counter = 1;
      todayData.forEach(item => {
        const url = getVal(item, ["Link Server"]);

        let nServer = "1";
        if (url && url.includes("s.id/uts_gaap")) {
          const parts = url.split("uts_gaap");
          if (parts[1]) nServer = parts[1];
        } else if (url && url.includes("uas")) {
          const match = url.match(/uas(\d+)/i);
          if (match && match[1]) nServer = match[1];
        } else if (url && url.match(/:(\d+)\//)) {
          // Ekstrak angka server dari port, misal http://143.20.10.22:200/ -> Server 2
          const match = url.match(/:(\d+)\//);
          if (match && match[1]) {
            let port = parseInt(match[1]);
            if (port >= 100 && port <= 900) {
              nServer = (Math.floor(port / 100)).toString();
            }
          }
        }

        const jamRaw = getVal(item, ["JAM (WIB)", "Jam Ujian"]);
        let [mulai, selesai] = [0, 0];
        if (jamRaw && jamRaw.includes("-")) {
          [mulai, selesai] = jamRaw.split("-").map(j => parseFloat(j.trim().replace(":", ".")));
        }

        let linkHTML = "";
        if (mulai > 0 && jamSekarang < mulai) {
          linkHTML = `<span class="badge bg-warning text-dark">Belum Dimulai</span>`;
        } else if (selesai > 0 && jamSekarang > selesai) {
          linkHTML = `<span class="badge bg-light text-success border border-success">Ujian Selesai</span>`;
        } else {
          linkHTML = `<a href="${url}" target="_blank" class="text-decoration-none">
                        <span class="badge bg-primary">Server ${nServer}</span>
                      </a>`;
        }

        const kelas = getVal(item, ["KELAS", "Kelas"]);
        const matkul = getVal(item, ["MATA KULIAH:", "MATA KULIAH", "Mata Kuliah"]); // Support various formats
        const dosen = getVal(item, ["KODE DOSEN", "Kode Dosen", "Dosen Pengampu"]);
        const nim = getVal(item, ["NIM"]);
        const nama = getVal(item, ["Nama Mahasiswa", "NAMA MAHASISWA"]);

        tbody.innerHTML += `
          <tr>
            <td>${counter++}</td>
            <td>${jamRaw}</td>
            <td>${nim}</td>
            <td>${nama}</td>
            <td>${kelas}</td>
            <td>${matkul}</td>
            <td>${linkHTML}</td>
            <td>${dosen}</td>
          </tr>`;
      });
    }

    ['sem1', 'sem3', 'sem5'].forEach(id => {
      const el = document.getElementById(`${id}-tab`);
      if (el) {
        el.addEventListener('click', (e) => {
          document.querySelectorAll('.nav-link').forEach(tab => tab.classList.remove('active'));
          e.target.classList.add('active');
          getData(id.replace('sem', ''));
        });
      }
    });

    document.getElementById("searchInput").addEventListener("keyup", function () {
      const keyword = this.value.toLowerCase();
      // Perbarui logika filter search juga agar mendukung format baru
      const getVal = (item, keys) => {
        for (const k of keys) {
          if (item[k] !== undefined && item[k] !== null) return item[k];
        }
        return "";
      };

      const filtered = allData.filter(item => {
        const matkul = getVal(item, ["MATA KULIAH:", "MATA KULIAH", "Mata Kuliah"]);
        const kelas = getVal(item, ["KELAS", "Kelas"]);
        const dosen = getVal(item, ["KODE DOSEN", "Kode Dosen", "Dosen Pengampu"]);
        const nama = getVal(item, ["Nama Mahasiswa", "NAMA MAHASISWA"]);
        const nim = getVal(item, ["NIM"]);

        return (matkul.toLowerCase().includes(keyword) ||
          kelas.toLowerCase().includes(keyword) ||
          dosen.toLowerCase().includes(keyword) ||
          nama.toLowerCase().includes(keyword) ||
          (nim && nim.toString().includes(keyword)));
      });
      renderTable(filtered);
    });

    document.getElementById("darkToggle").addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");
    });

    // ✅ Default tampil Semester 1
    window.addEventListener("DOMContentLoaded", () => {
      if (isWithinDateRange) {
        document.getElementById("sem1-tab").classList.add("active");
        getData(1);
      }
    });
  </script>
</body>

</html>
