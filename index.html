<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portal Jadwal Ujian Online resmi Universitas Satya Terra Bhinneka. Cek jadwal ujian Semester 2, 4, dan 6 secara real-time.">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="Jadwal Ujian Online | ST Bhinneka">
    <meta property="og:description" content="Cek jadwal ujian resmi Universitas Satya Terra Bhinneka.">
    <meta property="og:image" content="images/logo.png">
    <title>Jadwal Ujian | ST Bhinneka</title>
    <link rel="shortcut icon" href="images/logo.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="assets/style.css?v=177660666">
</head>
<body>

    <div class="container">
        <header>
            <div class="header-main">
                <div class="header-brand">
                    <img src="images/logo.png" alt="Logo ST Bhinneka">
                    <div class="header-text">
                        <h1>Jadwal Ujian Online</h1>
                        <p>Sistem Informasi Jadwal Ujian Online</p>
                    </div>
                </div>
                <button id="themeToggle" title="Toggle Dark Mode">
                    <i class="bi bi-moon-stars"></i>
                </button>
            </div>
        </header>


        <div id="infoHariTanggal" style="display: none;"></div>

        <nav class="nav-tabs" id="semesterTabs">
            <a href="#" class="nav-link active">Smt -</a>
        </nav>

        <div class="search-container">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Cari Mata Kuliah, Kelas, atau Dosen...">
        </div>

        <div style="text-align: center; margin-bottom: 2rem;">
            <button id="evaluationToggle" class="btn-eval">
                <i class="bi bi-eye"></i> Tampilkan Semua Hari (Mode Evaluasi)
            </button>
        </div>

        <div id="tableWrapper" class="glass-card fade-in-up" style="display: none;">
            <!-- View 1: Desktop Table (Hidden on Mobile via CSS) -->
            <div id="desktopContainer" class="table-container">
                <table id="desktopTable">
                    <thead>
                        <tr>
                            <th>Jam & Status</th>
                            <th>Kelas</th>
                            <th>Mata kuliah</th>
                            <th>Dosen</th>
                            <th style="width: 120px;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="desktopBody"></tbody>
                </table>
            </div>

            <!-- View 2: Mobile Card List (Hidden on Desktop via CSS) -->
            <div id="mobileCardList"></div>
            <div id="noData">
                <i class="bi bi-calendar-x"></i>
                <p>Tidak ada jadwal ujian untuk kriteria pencarian ini atau hari ini.</p>
            </div>
        </div>

        <p class="refresh-status" id="refreshStatus"></p>

        <footer>
            &copy; <span id="year"></span> Jadwal Ujian Online – PDSI Universitas Satya Terra Bhinneka
        </footer>
    </div>

    <script>
        // Core Constants
        const CACHE_TIME = 5 * 60 * 1000; // 5 minutes cache
        let currentData = [];
        let currentSemester = null;
        let activeExam = 'uts';
        let activePeriod = 'ganjil';

        // UI Elements
        const desktopBody = document.getElementById('desktopBody');
        const mobileCardList = document.getElementById('mobileCardList');
        const tableWrapper = document.getElementById('tableWrapper');
        const noData = document.getElementById('noData');
        const infoBar = document.getElementById('infoHariTanggal');
        const searchInput = document.getElementById('searchInput');
        const refreshStatus = document.getElementById('refreshStatus');
        const themeToggle = document.getElementById('themeToggle');
        const evaluationToggle = document.getElementById('evaluationToggle');
        let isEvaluationMode = false;

        // Initialize Theme — respects OS preference on first visit
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const useDark = savedTheme === 'dark' || (!savedTheme && prefersDark);

        if (useDark) {
            document.body.setAttribute('data-theme', 'dark');
            themeToggle.innerHTML = '<i class="bi bi-sun"></i>';
        }

        // Listen for OS-level theme changes (live switching)
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
                if (e.matches) {
                    document.body.setAttribute('data-theme', 'dark');
                    themeToggle.innerHTML = '<i class="bi bi-sun"></i>';
                } else {
                    document.body.removeAttribute('data-theme');
                    themeToggle.innerHTML = '<i class="bi bi-moon-stars"></i>';
                }
            }
        });

        themeToggle.addEventListener('click', () => {
            if (document.body.getAttribute('data-theme') === 'dark') {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeToggle.innerHTML = '<i class="bi bi-moon-stars"></i>';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeToggle.innerHTML = '<i class="bi bi-sun"></i>';
            }
        });

        evaluationToggle.addEventListener('click', () => {
            isEvaluationMode = !isEvaluationMode;
            evaluationToggle.classList.toggle('active');
            evaluationToggle.innerHTML = isEvaluationMode ? 
                '<i class="bi bi-eye-slash"></i> Sembunyikan Hari Lain' : 
                '<i class="bi bi-eye"></i> Tampilkan Semua Hari (Mode Evaluasi)';
            renderTable(currentData);
        });

        // Set Current Date
        const updateInfoBar = () => {
            const now = new Date();
            const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const formattedDate = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            infoBar.innerHTML = `<i class="bi bi-calendar-event"></i> &nbsp; ${days[now.getDay()]}, ${formattedDate}`;
            infoBar.style.display = 'block';
            document.getElementById("year").textContent = now.getFullYear();
        };

        // --- Skeleton Loading ---
        const showSkeleton = () => {
            const isDesktop = window.innerWidth > 768;
            tableWrapper.style.display = 'block';
            noData.style.display = 'none';
            if (isDesktop) {
                desktopBody.innerHTML = Array(4).fill(`
                    <tr class="table-row-premium">
                        <td><div style="padding:0"><div class="skeleton-block sm" style="margin-bottom:6px"></div><div class="skeleton-block sm" style="width:60px"></div></div></td>
                        <td><div class="skeleton-block sm" style="width:70px;margin:auto"></div></td>
                        <td><div class="skeleton-block lg"></div></td>
                        <td><div class="skeleton-block md"></div></td>
                        <td><div class="skeleton-block btn" style="margin:auto"></div></td>
                    </tr>`).join('');
            } else {
                mobileCardList.innerHTML = Array(3).fill(`
                    <div class="skeleton-card">
                        <div class="skeleton-block sm" style="width:100px"></div>
                        <div class="skeleton-block lg" style="width:90%"></div>
                        <div style="display:flex;gap:1rem">
                            <div class="skeleton-block sm" style="width:80px"></div>
                            <div class="skeleton-block sm" style="width:120px"></div>
                        </div>
                        <div class="skeleton-block btn"></div>
                    </div>`).join('');
            }
        };

        // Fetch Data with Caching
        const loadData = async (semester) => {
            document.documentElement.setAttribute('data-semester-theme', semester);
            currentSemester = semester;
            showSkeleton();
            const cacheKey = `data_${activeExam}_sem_${semester}`;
            const cached = localStorage.getItem(cacheKey);
            const cacheTime = localStorage.getItem(`${cacheKey}_time`);
            const now = Date.now();

            // Try Cache First
            if (cached && cacheTime && (now - cacheTime < CACHE_TIME)) {
                currentData = JSON.parse(cached);
                renderTable(currentData);
                refreshStatus.innerText = `Update terakhir: ${new Date(parseInt(cacheTime)).toLocaleTimeString()}`;
                return;
            }

            try {
                refreshStatus.innerText = "Memperbarui data...";
                const response = await fetch(`data/${activeExam}_semester-${semester}.json?v=${now}`);
                if (!response.ok) throw new Error('File data tidak ditemukan');
                
                const data = await response.json();
                
                // Save to Cache
                localStorage.setItem(cacheKey, JSON.stringify(data));
                localStorage.setItem(`${cacheKey}_time`, now.toString());
                
                currentData = data;
                renderTable(currentData);
                refreshStatus.innerText = "Data diperbarui dari server.";
            } catch (err) {
                console.error('Fetch error:', err);
                if (cached) {
                    currentData = JSON.parse(cached);
                    renderTable(currentData);
                    refreshStatus.innerText = "Gagal menyinkronkan. Menggunakan data cache.";
                } else {
                    desktopBody.innerHTML = '';
                    mobileCardList.innerHTML = '';
                    tableWrapper.style.display = 'block';
                    noData.style.display = 'block';
                    refreshStatus.innerText = "Gagal memuat data. Mohon hubungi IT Support.";
                }
            }
        };

        const renderTable = (data) => {
            const now = new Date();
            const hours = now.getHours();
            const currentTime = hours + (now.getMinutes() / 60);
            
            // --- Logic 6 AM Reset ---
            // If before 6 AM, we are still showing "Yesterday's" final state
            let displayDate = new Date(now);
            if (hours < 6) {
                displayDate.setDate(now.getDate() - 1);
            }
            
            const dayNames = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const displayDayName = dayNames[displayDate.getDay()].toLowerCase();
            const displayDateStr = `${String(displayDate.getDate()).padStart(2, '0')}/${String(displayDate.getMonth() + 1).padStart(2, '0')}/${displayDate.getFullYear()}`;

            // 1. Initial Filtering (Search or Date)
            let filtered = data;
            const term = searchInput.value.toLowerCase();
            
            if (term) {
                filtered = data.filter(i => 
                    (i["matkul"] || "").toLowerCase().includes(term) ||
                    (i["kelas"] || "").toLowerCase().includes(term) ||
                    (i["dosen"] || "").toLowerCase().includes(term)
                );
            } else if (!isEvaluationMode) {
                filtered = data.filter(item => {
                    // Match by full date string or relative day name
                    const itemHari = (item["hari"] || "").split(',')[0].trim().toLowerCase();
                    const itemTanggal = item["tanggal"] || "";
                    return itemTanggal === displayDateStr || itemHari === displayDayName || itemHari === "hari ini";
                });
            }

            if (filtered.length === 0) {
                tableWrapper.style.display = 'block';
                noData.style.display = 'block';
                desktopBody.innerHTML = '';
                mobileCardList.innerHTML = '';
                return;
            }

            // 2. Progressive Focus Filter (Hide finished sessions except the last one)
            let focusData = filtered.map((item, idx) => {
                const statusObj = getStatus(item["tanggal"], item["jam"], currentTime);
                return { ...item, ...statusObj, originalIndex: idx };
            });

            if (!isEvaluationMode && !term) {
                const totalItems = focusData.length;
                focusData = focusData.filter((item, idx) => {
                    // Always show Live and Upcoming
                    if (item.status === "Berlangsung" || item.status === "Mendatang") return true;
                    
                    // Show Selesai ONLY if it's the LAST session of the day
                    const isLastSesi = idx === totalItems - 1;
                    if (item.status === "Selesai" && isLastSesi) return true;
                    
                    return false;
                });
            }

            // 3. Render
            noData.style.display = 'none';
            tableWrapper.style.display = 'block';
            desktopBody.innerHTML = '';
            mobileCardList.innerHTML = '';

            const desktopContainer = document.getElementById('desktopContainer');
            if (window.innerWidth > 768) {
                desktopContainer.style.setProperty('display', 'block', 'important');
                mobileCardList.style.setProperty('display', 'none', 'important');
                renderDesktopView(focusData, currentTime);
            } else {
                desktopContainer.style.setProperty('display', 'none', 'important');
                mobileCardList.style.setProperty('display', 'block', 'important');
                renderMobileView(focusData, currentTime);
            }
        };

        const renderDesktopView = (data, currentTime) => {
            let lastDate = "";
            desktopBody.innerHTML = data.map((item, index) => {
                const dateRaw = `${item["hari"] || '-'}, ${item["tanggal"] || '-'}`;
                let dateHeader = "";
                if (isEvaluationMode && dateRaw !== lastDate) {
                    dateHeader = `<tr><td colspan="5"><div class="date-separator">${dateRaw}</div></td></tr>`;
                    lastDate = dateRaw;
                }

                const { status, badgeClass, clrClass } = getStatus(item["tanggal"], item["jam"], currentTime);
                const serverUrl = item["link_server"] || "#";
                const isBerlangsung = status === 'Berlangsung';
                const isSelesai = status === 'Selesai';

                return `
                    ${dateHeader}
                    <tr class="table-row-premium ${clrClass}">
                        <td>
                            <div style="font-weight:700; color:var(--primary); display:flex; align-items:center; gap:0.5rem; margin-bottom: 0.3rem;">
                                ${item["jam"] || '-'}
                                <span class="sesi-label" style="font-size:var(--fz-micro)">Sesi ${item["sesi"] || index + 1}</span>
                            </div>
                            <span class="status-badge ${badgeClass}" style="font-size:var(--fz-micro); padding: 0.2rem 0.6rem;">${status}</span>
                        </td>
                        <td><span class="kelas-badge">${item["kelas"] || '-'}</span></td>
                        <td style="font-weight:700; color:var(--text-main); font-size: var(--fz-title)">${item["matkul"] || '-'}</td>
                        <td style="color:var(--text-muted)">${item["dosen"] || '-'}</td>
                        <td>
                            <span class="tooltip-wrapper" ${!isBerlangsung && !isSelesai ? `data-tooltip="Dibuka pukul ${item['jam'] ? item['jam'].split('-')[0].trim() : '-'}"` : ''}>
                            <a href="${isBerlangsung ? serverUrl : 'javascript:void(0)'}" 
                               ${isBerlangsung ? 'target="_blank"' : ''}
                               class="btn-premium ${isBerlangsung ? 'btn-active' : (isSelesai ? 'btn-ended' : 'btn-upcoming')}" 
                               style="padding:0.5rem; font-size:12px">
                                ${isBerlangsung ? 'Masuk ujian' : (isSelesai ? 'Selesai' : '<i class="bi bi-lock-fill"></i> Terkunci')}
                            </a>
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');
        };

        const renderMobileView = (data, currentTime) => {
            let lastDate = "";
            mobileCardList.innerHTML = data.map((item, index) => {
                const dateRaw = `${item["hari"] || '-'}, ${item["tanggal"] || '-'}`;
                let dateHeader = "";
                if (isEvaluationMode && dateRaw !== lastDate) {
                    dateHeader = `<div class="date-separator">${dateRaw}</div>`;
                    lastDate = dateRaw;
                }

                const { status, badgeClass, clrClass } = getStatus(item["tanggal"], item["jam"], currentTime);
                const serverUrl = item["link_server"] || "#";
                const isBerlangsung = status === 'Berlangsung';
                const isSelesai = status === 'Selesai';

                return `
                    ${dateHeader}
                    <div class="exam-card ${clrClass}">
                        <div class="card-meta-header">
                            <div class="time-header">
                                <i class="bi bi-clock-history"></i> ${item["jam"] || '-'}
                                <span class="sesi-label">Sesi ${item["sesi"] || index+1}</span>
                            </div>
                            <span class="status-badge ${badgeClass}" style="font-size:9px; padding: 0.1rem 0.4rem;">${status}</span>
                        </div>
                        <div class="card-title">${item["matkul"] || '-'}</div>
                        <div class="card-grid">
                            <div class="grid-item">
                                <i class="bi bi-door-open"></i> ${item["kelas"] || '-'}
                            </div>
                            <div class="grid-item">
                                <i class="bi bi-person-badge"></i> ${item["dosen"] || '-'}
                            </div>
                        </div>
                        <span class="tooltip-wrapper" ${!isBerlangsung && !isSelesai ? `data-tooltip="Dibuka pukul ${item['jam'] ? item['jam'].split('-')[0].trim() : '-'}"` : ''}>
                        <a href="${isBerlangsung ? serverUrl : 'javascript:void(0)'}" 
                           ${isBerlangsung ? 'target="_blank"' : ''}
                           class="btn-premium ${isBerlangsung ? 'btn-active' : (isSelesai ? 'btn-ended' : 'btn-upcoming')}">
                           ${isBerlangsung ? 'Masuk ujian' : (isSelesai ? 'Selesai' : '<i class="bi bi-lock-fill"></i> Terkunci')}
                        </a>
                        </span>
                    </div>
                `;
            }).join('');
        };

        const getStatus = (dateStr, jamRaw, currentTime) => {
            let status = "Mendatang";
            let badgeClass = "status-upcoming";
            let clrClass = "";

            const now = new Date();
            const todayStr = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;
            
            // Basic date comparison
            const parseDate = (s) => {
                const [d, m, y] = s.split('/').map(Number);
                return new Date(y, m - 1, d);
            };

            const examDate = parseDate(dateStr);
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            if (examDate > today) {
                status = "Mendatang";
            } else if (examDate < today) {
                status = "Selesai";
                badgeClass = "status-ended";
                clrClass = "card-ended row-ended";
            } else {
                // Same day: Check time
                if (jamRaw && jamRaw.includes("-")) {
                    const [mulai, selesai] = jamRaw.split("-").map(j => parseFloat(j.trim().replace(":", ".").replace(",", ".")));
                    if (currentTime >= mulai && currentTime <= selesai) {
                        status = "Berlangsung"; 
                        badgeClass = "status-active";
                        clrClass = "card-active row-active";
                    } else if (currentTime > selesai) {
                        status = "Selesai"; 
                        badgeClass = "status-ended";
                        clrClass = "card-ended row-ended";
                    }
                }
            }
            return { status, badgeClass, clrClass };
        };

        window.addEventListener('resize', () => renderTable(currentData));

        // Search Handling (Debounced)
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const term = e.target.value.toLowerCase();
                if (!term) {
                    renderTable(currentData);
                    return;
                }
                const filtered = currentData.filter(i => 
                    (i["matkul"] || "").toLowerCase().includes(term) ||
                    (i["kelas"] || "").toLowerCase().includes(term) ||
                    (i["dosen"] || "").toLowerCase().includes(term)
                );
                renderTable(filtered);
            }, 300);
        });

        // --- Analytics System ---
        const logEvent = (action, sem) => {
            try {
                const formData = new FormData();
                formData.append('action', action);
                formData.append('exam_type', activeExam);
                formData.append('semester', sem || 0);
                
                fetch('api_logger.php', {
                    method: 'POST',
                    body: formData,
                    keepalive: true // Crucial for "fire and forget" tracking
                }).catch(() => {}); // Silence errors
            } catch (e) {}
        };

        // Bootstrap App
        const initApp = async () => {
            updateInfoBar();
            showSkeleton();
            
            try {
                // Fetch Master Config
                const qs = '?v=' + Date.now();
                const res = await fetch('data/config.json' + qs);
                const config = await res.json();
                activeExam = config.active_exam || 'uts';
                activePeriod = config.active_period || 'ganjil';
                
                // Update UI Title
                const titleLabel = config.active_exam_label || "Jadwal Ujian";
                document.querySelector('.header-text h1').textContent = titleLabel;
                document.title = titleLabel + " | ST Bhinneka";
            } catch (e) {
                console.error("Config missing, falling back to defaults.");
            }

            // Generate Nav Tabs Dynamically
            const tabsContainer = document.getElementById('semesterTabs');
            tabsContainer.innerHTML = '';
            const semesters = (activePeriod === 'ganjil') ? [1, 3, 5, 7] : [2, 4, 6, 8];
            
            semesters.forEach((sem, idx) => {
                const a = document.createElement('a');
                a.href = "#";
                a.className = "nav-link";
                if (idx === 0) a.classList.add('active'); // First tab active initially
                a.dataset.semester = sem;
                a.textContent = "Semester " + sem;
                
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.nav-link').forEach(nav => nav.classList.remove('active'));
                    e.target.classList.add('active');
                    loadData(sem);
                    logEvent('tab_click', sem);
                });
                
                tabsContainer.appendChild(a);
            });

            // Load Initial Data
            if (semesters.length > 0) {
                loadData(semesters[0]);
                logEvent('page_load', semesters[0]);
            }
        };

        initApp();

    </script>
</body>
</html>
