<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Tidak Ditemukan | ST Bhinneka</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .error-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .error-container {
            max-width: 500px;
        }

        h1 {
            font-size: 8rem;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            color: #e2e8f0;
            text-shadow: 4px 4px 0 #cbd5e1;
        }

        h2 {
            font-size: 1.8rem;
            color: #0f172a;
            margin-top: -1rem;
            position: relative;
            z-index: 2;
        }

        p {
            color: #64748b;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .btn-home {
            display: inline-block;
            background-color: #4f46e5;
            color: white;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 10px 20px -10px rgba(79, 70, 229, 0.5);
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background-color: #4338ca;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -10px rgba(79, 70, 229, 0.6);
        }
        
        footer {
            text-align: center;
            color: #64748b;
            font-size: 0.75rem;
            border-top: 1px solid #e2e8f0;
            padding: 2rem 1rem;
            letter-spacing: 0.3px;
        }

        @media (prefers-color-scheme: dark) {
            body { background-color: #0f172a; color: #cbd5e1; }
            h1 { color: #1e293b; text-shadow: 4px 4px 0 #334155; }
            h2 { color: #f8fafc; }
            p { color: #94a3b8; }
            footer { border-top-color: #334155; color: #64748b; }
        }
    </style>
</head>
<body>
    <div class="error-wrapper">
        <div class="error-container">
            <h1>404</h1>
            <h2>Waduh, Anda Tersesat!</h2>
            <p>Halaman atau direktori yang Anda cari tidak dapat ditemukan, atau akses ke area ini dibatasi oleh sistem peladen.</p>
            <a href="/ujian/" class="btn-home">Kembali ke Beranda</a>
        </div>
    </div>
    
    <footer>
        &copy; <span id="year"></span> Sistem Ujian Online CBT – PDSI Universitas Satya Terra Bhinneka
    </footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
</body>
</html>
