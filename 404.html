<!DOCTYPE html>
<html lang="en" style="height:100%;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>404 Not Found</title>
    <style>
        body {
            color: #444;
            margin: 0;
            font: normal 14px/20px Arial, Helvetica, sans-serif;
            height: 100%;
            background-color: #fff;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #000 !important;
                color: #ccc;
            }
        }

        .container {
            min-height: 100%;
            height: auto;
        }

        .message {
            text-align: center;
            width: 800px;
            max-width: 90%;
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
        }

        .message h1 {
            margin: 0;
            font-size: 150px;
            line-height: 150px;
            font-weight: bold;
        }

        .message h2 {
            margin-top: 20px;
            font-size: 30px;
        }

        footer {
            color: #f0f0f0;
            font-size: 12px;
            text-align: center;
            padding: 15px 30px;
            position: relative;
            background-color: #474747;
            border-top: 1px solid rgba(0, 0, 0, 0.15);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.3) inset;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="message">
            <h1>404</h1>
            <h2>page can’t be found</h2>
            <p>No webpage was found for the web address.</p>
        </div>
    </div>
    <footer>
        &copy; 2025. All rights reserved.
    </footer>
</body>
</html>
