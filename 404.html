<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-slate-900 flex flex-col min-h-screen items-center justify-center p-4">
    <div class="max-w-[450px] w-full text-center space-y-6">
        <div class="space-y-2">
            <h1 class="text-9xl font-extrabold tracking-tighter text-slate-100 select-none">404</h1>
            <h2 class="text-2xl font-bold tracking-tight mt-[-2.5rem] relative z-10">Halaman Tidak Ditemukan</h2>
            <p class="text-slate-500 text-sm leading-relaxed">Maaf, halaman yang Anda cari tidak ada atau akses Anda dibatasi oleh kebijakan keamanan server.</p>
        </div>
        
        <div class="flex flex-col sm:flex-row gap-2 justify-center pt-4">
            <a href="/" class="px-8 py-2.5 bg-slate-900 text-white text-sm font-medium rounded-md hover:bg-slate-800 transition-all active:scale-95 shadow-sm">Kembali ke Beranda</a>
            <button onclick="window.history.back()" class="px-8 py-2.5 border border-slate-200 text-slate-900 text-sm font-medium rounded-md hover:bg-slate-50 transition-all active:scale-95">Kembali Sebelumnya</button>
        </div>

        <div class="pt-12 border-t border-slate-100">
            <div class="flex items-center justify-center gap-2 text-[10px] font-bold text-slate-300 uppercase tracking-[0.2em]">
                <div class="w-1.5 h-1.5 rounded-full bg-slate-200"></div>
                Security Shield Active
            </div>
        </div>
    </div>

    <footer class="mt-auto py-8 text-[11px] text-slate-400 font-medium">
        &copy; <span id="year"></span> PDSI – ST Bhinneka
    </footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
</body>
</html>
