# ============================================================
# NGINX CONFIGURATION - Jadwal Ujian Online (ST Bhinneka)
# ============================================================

server {
    listen 80;
    server_name ujian.satyaterrabhinneka.ac.id;
    
    # Path Root: Mengarah ke folder public di dalam container Docker
    root /var/www/html/public;
    index index.html index.php;

    # --- 1. LOGGING (Auditability) ---
    access_log /var/log/nginx/ujian_access.log;
    error_log  /var/log/nginx/ujian_error.log warn;

    # --- 2. CLEAN SEO URLS (Extension-less PHP) ---
    
    # Handle /panel/dashboard, /panel/logs, dll.
    location /panel {
        try_files $uri $uri/ @rewrite_panel;
    }

    location @rewrite_panel {
        # Mencari file .php yang sesuai di dalam folder panel
        rewrite ^/panel/([^/]+)$ /panel/$1.php last;
    }

    # --- 3. SECURITY & BLOCKING ---

    # Blokir akses langsung ke folder CORE (Sangat Penting)
    location /core {
        deny all;
        return 404;
    }

    # Blokir file sensitif
    location ~ /\.(git|htaccess|env|sql) {
        deny all;
    }

    # --- 4. PHP HANDLING ---
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # SESUAIKAN: ganti ke service PHP di docker-compose Anda
        fastcgi_pass ujian_php:9000; 
        
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # --- 5. STATIC ASSETS & CACHING ---
    location /assets/ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # --- 6. CUSTOM ERROR HANDLING ---
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
