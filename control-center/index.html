<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | Control X</title>
    <link rel="shortcut icon" href="/assets/images/favicon.png">
    <!-- Tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body { font-family: 'Outfit', sans-serif; background: radial-gradient(circle at top left, #1e1b4b, #0f172a); }
        .glass-login { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md animate-in fade-in zoom-in duration-700">
        <!-- Logo Area -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-indigo-500/40 mb-4 rotate-3">
                <i class="bi bi-shield-lock text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Control <span class="text-indigo-500">X</span></h1>
            <p class="text-slate-400 text-sm mt-2">Authorized Personnel Only</p>
        </div>

        <!-- Login Card -->
        <div class="glass-login p-8 rounded-[2rem] shadow-2xl">
            <form id="loginForm" class="space-y-5">
                <div class="form-control">
                    <label class="label"><span class="label-text text-slate-300 font-semibold uppercase text-[10px] tracking-widest">Username</span></label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-4 flex items-center text-slate-500"><i class="bi bi-person"></i></span>
                        <input type="text" id="username" required class="input input-bordered w-full bg-slate-900/50 pl-11 focus:border-indigo-500" placeholder="Username">
                    </div>
                </div>

                <div class="form-control">
                    <label class="label"><span class="label-text text-slate-300 font-semibold uppercase text-[10px] tracking-widest">Secret Password</span></label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-4 flex items-center text-slate-500"><i class="bi bi-key"></i></span>
                        <input type="password" id="password" required class="input input-bordered w-full bg-slate-900/50 pl-11 focus:border-indigo-500" placeholder="••••••••">
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" id="loginBtn" class="btn btn-primary w-full rounded-xl shadow-lg shadow-indigo-600/30 font-bold text-lg h-14">
                        Unlock Dashboard
                    </button>
                </div>

                <div id="errorMsg" class="hidden animate-bounce text-center text-red-400 text-sm font-medium mt-4 bg-red-500/10 py-2 rounded-lg border border-red-500/20">
                    <i class="bi bi-exclamation-triangle"></i> Credential mismatch detected.
                </div>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center mt-8 text-slate-500 text-xs">
            &copy; 2026 SATYA TERRA BHINNEKA. Secure Infrastructure.
        </p>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            loginBtn.classList.add('loading');

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminRole', data.role);
                    localStorage.setItem('adminUser', username);
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.classList.remove('hidden');
                    loginBtn.classList.remove('loading');
                }
            } catch (err) {
                errorMsg.innerText = "Connection lost. Check your server.";
                errorMsg.classList.remove('hidden');
                loginBtn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
